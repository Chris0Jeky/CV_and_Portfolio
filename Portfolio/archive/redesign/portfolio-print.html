<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Chris Tcaci — The Tcaci Quarterly (Print)</title>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,200..700;1,6..72,200..700&family=IBM+Plex+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@300;400;500;600;700&family=Caveat:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #f4f1ea;
    --paper-2: #ebe6db;
    --paper-3: #e2dccd;
    --ink: #161514;
    --ink-2: #2a2723;
    --ink-dim: #5a554d;
    --ink-mute: #8a847a;
    --rule: #1a1817;
    --rouge: #cc3a2e;
    --forest: #1a4d3a;
    --gold: #b08a2e;
    --teal: #2a6b78;
    --teal-soft: #d0dde0;
    --term-bg: #0e1418;
    --term-fg: #d8e0e8;
    --term-dim: #6f8190;
    --term-mute: #46555f;
    --term-green: #7cf4b8;
    --term-amber: #ffb454;
    --term-red: #ff6b7a;
    --term-cyan: #6fc3df;
    --serif: 'Newsreader', 'Times New Roman', serif;
    --sans: 'IBM Plex Sans', system-ui, sans-serif;
    --mono: 'IBM Plex Mono', ui-monospace, monospace;
    --hand: 'Caveat', cursive;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--paper); color: var(--ink); }
  body {
    font-family: var(--serif);
    font-size: 17px;
    line-height: 1.55;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }
  a { color: inherit; text-decoration: underline; text-decoration-thickness: 1px; text-underline-offset: 3px; }
  hr { border: none; border-top: 1px solid var(--rule); margin: 0; }
  .term {
    background: var(--term-bg);
    color: var(--term-fg);
    font-family: var(--mono);
    font-size: 12.5px;
    line-height: 1.7;
    padding: 18px 22px;
    border: 1px solid #000;
    box-shadow: 4px 4px 0 var(--rule);
    position: relative;
  }
  .term .prompt { color: var(--term-green); }
  .term .dim { color: var(--term-dim); }
  .term .ok { color: var(--term-green); }
  .term .warn { color: var(--term-amber); }
  .term .err { color: var(--term-red); }
  .term .cyan { color: var(--term-cyan); }
  .term-label {
    position: absolute; top: -10px; left: 16px; background: var(--term-bg);
    color: var(--term-amber); font-family: var(--mono); font-size: 10px;
    padding: 2px 8px; letter-spacing: 0.18em; text-transform: uppercase;
  }
  .label { font-family: var(--sans); font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-dim); }
  .dropcap::first-letter {
    font-family: var(--serif); font-size: 5em; line-height: 0.85; float: left;
    margin: 4px 8px 0 0; font-weight: 400; color: var(--rouge);
  }
  .stamp {
    display: inline-block; border: 2px solid currentColor; padding: 4px 10px;
    font-family: var(--sans); font-size: 11px; font-weight: 700;
    letter-spacing: 0.12em; text-transform: uppercase;
    transform: rotate(-2deg);
  }
  .pull-quote {
    font-family: var(--serif); font-style: italic; font-weight: 300;
    font-size: 32px; line-height: 1.3; letter-spacing: -0.01em;
  }
  .margin-note {
    font-family: var(--hand); font-size: 22px; line-height: 1.1;
    color: var(--rouge); transform: rotate(-3deg);
  }
  .hand { font-family: var(--hand); color: var(--rouge); font-size: 22px; line-height: 1; }
  .container { max-width: 1280px; margin: 0 auto; padding: 0 56px; }
  .fn { color: var(--rouge); font-size: 0.7em; vertical-align: super; }

  /* Disable navbar in print and reset hover/anim */
  .navbar { display: none !important; }
  .pulse, .blink { animation: none !important; }
  input[type=range] { display: none; }

  /* Page setup */
  @page {
    size: A4 portrait;
    margin: 12mm 10mm;
  }
  @media print {
    html, body {
      background: var(--paper) !important;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }
    .container { padding: 0 12mm; max-width: 100%; }
    .page-break { break-before: page; page-break-before: always; }
    .avoid-break { break-inside: avoid; page-break-inside: avoid; }
    section { break-inside: avoid; }
    article { break-inside: avoid; }
    .term { break-inside: avoid; }
    h1, h2, h3 { break-after: avoid; page-break-after: avoid; }
    a { color: inherit; text-decoration: none; }
    .no-print { display: none !important; }
    /* Make 2-col grids stack tighter or as-is — keep as-is for fidelity */
    body { font-size: 12pt; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="portfolio/utils.jsx"></script>
<script type="text/babel" src="portfolio/hero.jsx"></script>
<script type="text/babel" src="portfolio/about.jsx"></script>
<script type="text/babel" src="portfolio/experience.jsx"></script>
<script type="text/babel" src="portfolio/numbers.jsx"></script>
<script type="text/babel" src="portfolio/credentials.jsx"></script>
<script type="text/babel" src="portfolio/wealthlens.jsx"></script>
<script type="text/babel" src="portfolio/navsentinel.jsx"></script>
<script type="text/babel" src="portfolio/projects.jsx"></script>
<script type="text/babel" src="portfolio/skills.jsx"></script>
<script type="text/babel" src="portfolio/contact.jsx"></script>

<script type="text/babel">
/* global React, ReactDOM, Masthead, Hero, About, Experience, Projects, Skills, Contact, Colophon */
const { useEffect } = React;

function PrintApp() {
  // Force IPD simulation to be paused (no animations in print)
  return (
    <div id="top">
      <Masthead/>
      <Hero/>
      <div className="page-break"/>
      <About/>
      <div className="page-break"/>
      <Experience/>
      <ByTheNumbers/>
      <div className="page-break"/>
      <Credentials/>
      <div className="page-break"/>
      <Projects/>
      <div className="page-break"/>
      <Skills/>
      <div className="page-break"/>
      <Contact/>
      <Colophon/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<PrintApp/>);

// Auto-print after fonts + babel + a small grace delay
(async () => {
  try {
    if (document.fonts && document.fonts.ready) {
      await document.fonts.ready;
    }
  } catch(e) {}
  // wait an extra beat for sims/state to settle, then print
  setTimeout(() => { window.print(); }, 1200);
})();
</script>
</body>
</html>
