<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Chris Tcaci — The Tcaci Quarterly</title>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>

<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  :root {
    --paper: #f4f1ea;
    --paper-2: #ebe6db;
    --paper-3: #e2dccd;
    --ink: #161514;
    --ink-2: #2a2723;
    --ink-dim: #5a554d;
    --ink-mute: #8a847a;
    --rule: #1a1817;
    --rouge: #cc3a2e;
    --forest: #1a4d3a;
    --gold: #b08a2e;
    --teal: #2a6b78;
    --teal-soft: #d0dde0;
    --term-bg: #0e1418;
    --term-fg: #d8e0e8;
    --term-dim: #6f8190;
    --term-mute: #46555f;
    --term-green: #7cf4b8;
    --term-amber: #ffb454;
    --term-red: #ff6b7a;
    --term-cyan: #6fc3df;
    --serif: 'Newsreader', 'Times New Roman', serif;
    --sans: 'IBM Plex Sans', system-ui, sans-serif;
    --mono: 'IBM Plex Mono', ui-monospace, monospace;
    --hand: 'Caveat', cursive;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--paper); color: var(--ink); }
  body {
    font-family: var(--serif);
    font-size: 17px;
    line-height: 1.55;
    background-image:
      radial-gradient(circle at 20% 10%, rgba(0,0,0,0.02) 0, transparent 40%),
      radial-gradient(circle at 80% 60%, rgba(0,0,0,0.015) 0, transparent 40%);
  }
  ::selection { background: var(--rouge); color: var(--paper); }
  a { color: inherit; text-decoration: underline; text-decoration-thickness: 1px; text-underline-offset: 3px; }
  a:hover { color: var(--rouge); }
  hr { border: none; border-top: 1px solid var(--rule); margin: 0; }
  .rule-2 { border-top: 2px solid var(--rule); }
  .rule-3 { border-top: 3px double var(--rule); }
  /* Engineering log block */
  .term {
    background: var(--term-bg);
    color: var(--term-fg);
    font-family: var(--mono);
    font-size: 12.5px;
    line-height: 1.7;
    padding: 18px 22px;
    border: 1px solid #000;
    box-shadow: 4px 4px 0 var(--rule);
    position: relative;
  }
  .term .prompt { color: var(--term-green); }
  .term .dim { color: var(--term-dim); }
  .term .ok { color: var(--term-green); }
  .term .warn { color: var(--term-amber); }
  .term .err { color: var(--term-red); }
  .term .cyan { color: var(--term-cyan); }
  .term-label {
    position: absolute; top: -10px; left: 16px; background: var(--term-bg);
    color: var(--term-amber); font-family: var(--mono); font-size: 10px;
    padding: 2px 8px; letter-spacing: 0.18em; text-transform: uppercase;
  }
  .small-caps { font-variant: small-caps; letter-spacing: 0.05em; }
  .hand { font-family: var(--hand); color: var(--rouge); font-size: 22px; line-height: 1; }
  .label { font-family: var(--sans); font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-dim); }
  .dropcap::first-letter {
    font-family: var(--serif); font-size: 5em; line-height: 0.85; float: left;
    margin: 4px 8px 0 0; font-weight: 400; color: var(--rouge);
  }
  .stamp {
    display: inline-block; border: 2px solid currentColor; padding: 4px 10px;
    font-family: var(--sans); font-size: 11px; font-weight: 700;
    letter-spacing: 0.12em; text-transform: uppercase;
    transform: rotate(-2deg);
  }
  .pull-quote {
    font-family: var(--serif); font-style: italic; font-weight: 300;
    font-size: 32px; line-height: 1.3; letter-spacing: -0.01em;
  }
  /* margin annotation */
  .margin-note {
    font-family: var(--hand); font-size: 22px; line-height: 1.1;
    color: var(--rouge); transform: rotate(-3deg);
  }
  .arrow { font-family: var(--hand); font-size: 26px; color: var(--rouge); }
  .ascii { white-space: pre; font-family: var(--mono); }
  /* button */
  .btn {
    display: inline-flex; align-items: center; gap: 8px;
    font-family: var(--sans); font-size: 12px; font-weight: 600;
    letter-spacing: 0.12em; text-transform: uppercase;
    padding: 10px 18px; border: 1.5px solid var(--ink); background: transparent;
    color: var(--ink); cursor: pointer; text-decoration: none;
  }
  .btn:hover { background: var(--ink); color: var(--paper); }
  .btn-rouge { border-color: var(--rouge); color: var(--rouge); }
  .btn-rouge:hover { background: var(--rouge); color: var(--paper); }
  /* slider */
  input[type="range"] {
    -webkit-appearance: none; appearance: none; height: 4px;
    background: var(--rule); outline: none; width: 100%;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none; width: 14px; height: 14px;
    background: var(--rouge); cursor: pointer; border-radius: 0;
  }
  input[type="range"]::-moz-range-thumb {
    width: 14px; height: 14px; background: var(--rouge); cursor: pointer; border: none; border-radius: 0;
  }
  /* k anim */
  @keyframes blink { 0%,49% {opacity:1} 50%,100% {opacity:0} }
  .blink { animation: blink 1s steps(1) infinite; }
  @keyframes pulse-dot { 0%, 100% { opacity: 1 } 50% { opacity: 0.3 } }
  .pulse { animation: pulse-dot 1.6s ease-in-out infinite; }
  /* shake (used by konami) */
  @keyframes shake { 0%,100% { transform: translate(0,0) } 25% { transform: translate(-2px, 1px) } 50% { transform: translate(1px, -1px) } 75% { transform: translate(-1px, 2px) }}

  /* navbar */
  .navbar {
    position: sticky; top: 0; z-index: 50;
    background: rgba(244, 241, 234, 0.92);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    border-bottom: 1px solid var(--rule);
  }
  .nav-inner {
    max-width: 1280px; margin: 0 auto; padding: 12px 56px;
    display: flex; justify-content: space-between; align-items: center;
    font-family: var(--sans); font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase;
  }
  .nav-inner a { text-decoration: none; }
  .nav-links { display: flex; gap: 28px; }
  .nav-links a:hover { color: var(--rouge); text-decoration: underline; text-underline-offset: 4px; }
  .container { max-width: 1280px; margin: 0 auto; padding: 0 56px; }

  /* footnote pop */
  .fn { color: var(--rouge); font-size: 0.7em; vertical-align: super; cursor: help; }

  /* responsive */
  @media (max-width: 900px) {
    .nav-inner, .container { padding-left: 24px; padding-right: 24px; }
    .nav-links { gap: 16px; }
    body { font-size: 16px; }
  }
  /* Print: hide the WebGL shader and boot overlay, restore solid paper */
  @media print {
    #paper-shader, #tcaci-boot { display: none !important; }
    body { background: var(--paper) !important; background-image: none !important; }
    .ink-underline::after { display: none !important; }
  }
</style>
</head>
